<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-label="抖音发布从多次启动浏览器优化为单浏览器会话">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1200" height="500" rx="28" fill="#f8fafc"/>
  <text x="60" y="68" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="700" fill="#111827">一次发布，只使用一个 Chrome 会话</text>
  <text x="60" y="106" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">登录状态检查、内容上传、位置选择和发布在同一个窗口内完成。</text>

  <g transform="translate(60 148)" filter="url(#shadow)">
    <rect width="440" height="286" rx="18" fill="#ffffff"/>
  </g>
  <text x="92" y="192" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="700" fill="#b91c1c">修复前：最多启动 4 次</text>
  <g font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#475569">
    <g transform="translate(92 222)">
      <rect width="174" height="72" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
      <rect width="174" height="18" rx="10" fill="#fecdd3"/>
      <circle cx="14" cy="9" r="3" fill="#ef4444"/>
      <text x="18" y="49">Cookie 预检 1</text>
    </g>
    <g transform="translate(294 222)">
      <rect width="174" height="72" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
      <rect width="174" height="18" rx="10" fill="#fecdd3"/>
      <circle cx="14" cy="9" r="3" fill="#ef4444"/>
      <text x="18" y="49">Cookie 预检 2</text>
    </g>
    <g transform="translate(92 320)">
      <rect width="174" height="72" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
      <rect width="174" height="18" rx="10" fill="#fecdd3"/>
      <circle cx="14" cy="9" r="3" fill="#ef4444"/>
      <text x="18" y="49">Cookie 预检 3</text>
    </g>
    <g transform="translate(294 320)">
      <rect width="174" height="72" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
      <rect width="174" height="18" rx="10" fill="#fecdd3"/>
      <circle cx="14" cy="9" r="3" fill="#ef4444"/>
      <text x="28" y="49">真正上传</text>
    </g>
  </g>

  <line x1="530" y1="290" x2="648" y2="290" stroke="#475569" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="554" y="272" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#475569">合并会话</text>

  <g transform="translate(684 148)" filter="url(#shadow)">
    <rect width="456" height="286" rx="18" fill="#ffffff"/>
  </g>
  <text x="716" y="192" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="21" font-weight="700" fill="#166534">现在：只启动 1 次</text>
  <g transform="translate(716 222)">
    <rect width="392" height="170" rx="14" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
    <rect width="392" height="28" rx="14" fill="#bbf7d0"/>
    <circle cx="17" cy="14" r="4" fill="#22c55e"/>
    <text x="28" y="70" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#166534">同一个 Chrome 窗口</text>
    <text x="28" y="108" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#334155">登录校验 → 上传 → 国内 POI → 发布</text>
    <text x="28" y="140" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#64748b">Cookie 失效时直接提示重新登录，不重复开窗口</text>
  </g>
</svg>
