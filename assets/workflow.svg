<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-label="抖音团购选品图文视频发布自动化流程">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7f7"/>
      <stop offset="100%" stop-color="#f6fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#ef255c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="60" y="74" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="34" font-weight="700" fill="#111827">抖音团购选品图文/视频发布自动化</text>
  <text x="60" y="112" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#4b5563">从后台选品、生成内容，到图文或视频挂团购位置发布，形成一条可复用 CLI 流程。</text>

  <g transform="translate(54 168)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="236" height="220" rx="18" fill="#ffffff"/>
    </g>
    <circle cx="42" cy="46" r="22" fill="#ef255c"/>
    <text x="34" y="54" font-family="Arial" font-size="24" font-weight="700" fill="#fff">1</text>
    <text x="76" y="42" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#111827">生意经选品</text>
    <text x="28" y="90" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#4b5563">按“昨天 + 商品成交券数”</text>
    <text x="28" y="120" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#4b5563">抓取高转化卡券</text>
    <rect x="28" y="150" width="180" height="40" rx="10" fill="#fff0f4"/>
    <text x="45" y="176" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#ef255c">selection.json</text>
  </g>

  <line x1="314" y1="278" x2="386" y2="278" stroke="#ef255c" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(410 168)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="236" height="220" rx="18" fill="#ffffff"/>
    </g>
    <circle cx="42" cy="46" r="22" fill="#ef255c"/>
    <text x="34" y="54" font-family="Arial" font-size="24" font-weight="700" fill="#fff">2</text>
    <text x="76" y="42" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#111827">生成 brief</text>
    <text x="28" y="90" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#4b5563">把商品详情改写成</text>
    <text x="28" y="120" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#4b5563">对外推广文案和 prompt</text>
    <rect x="28" y="150" width="180" height="40" rx="10" fill="#f1f5f9"/>
    <text x="45" y="176" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#334155">title / caption / prompts</text>
  </g>

  <line x1="670" y1="278" x2="742" y2="278" stroke="#ef255c" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(766 168)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="236" height="220" rx="18" fill="#ffffff"/>
    </g>
    <circle cx="42" cy="46" r="22" fill="#ef255c"/>
    <text x="34" y="54" font-family="Arial" font-size="24" font-weight="700" fill="#fff">3</text>
    <text x="76" y="42" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#111827">原生生图</text>
    <text x="28" y="90" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#4b5563">Codex 读取 image_prompts</text>
    <text x="28" y="120" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#4b5563">生成 3-5 张海报</text>
    <rect x="28" y="150" width="180" height="40" rx="10" fill="#ecfeff"/>
    <text x="45" y="176" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#0e7490">images/*.png</text>
  </g>

  <line x1="1026" y1="278" x2="1094" y2="278" stroke="#ef255c" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(930 410)">
    <rect x="0" y="0" width="220" height="48" rx="24" fill="#111827"/>
    <text x="35" y="31" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" font-weight="700" fill="#fff">发布成功进入作品管理页</text>
  </g>

  <g transform="translate(54 410)">
    <rect x="0" y="0" width="760" height="48" rx="24" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="28" y="31" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" fill="#374151">最后一步：上传图文/视频 → 位置/带货模式/国内 → 输入 POI → 选择门店 → 发布</text>
  </g>
</svg>
