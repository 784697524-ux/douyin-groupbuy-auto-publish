<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="抖音团购国内位置选择示意">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="620" rx="28" fill="#f9fafb"/>
  <text x="64" y="70" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="32" font-weight="700" fill="#111827">团购位置怎么选：国内 + 输入 POI + 选商场级候选</text>
  <text x="64" y="108" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#64748b">脚本会避免把位置选成店铺级候选，例如“植村秀(滨湖银泰城店)”。</text>

  <g transform="translate(92 150)" filter="url(#shadow)">
    <rect width="1016" height="390" rx="22" fill="#ffffff"/>
  </g>

  <text x="132" y="206" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#111827">添加标签</text>
  <rect x="132" y="236" width="126" height="46" rx="10" fill="#f1f5f9"/>
  <text x="170" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#111827">位置</text>
  <rect x="272" y="236" width="150" height="46" rx="10" fill="#f1f5f9"/>
  <text x="310" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#111827">带货模式</text>
  <rect x="440" y="236" width="514" height="46" rx="10" fill="#fff" stroke="#ef255c" stroke-width="2"/>
  <text x="464" y="266" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#111827">合肥滨湖银泰百货</text>

  <rect x="440" y="302" width="514" height="206" rx="16" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="476" y="346" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" fill="#94a3b8">本地</text>
  <text x="584" y="346" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#111827">国内</text>
  <line x1="580" y1="360" x2="628" y2="360" stroke="#111827" stroke-width="3"/>

  <rect x="468" y="382" width="448" height="54" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="488" y="414" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#166534">合肥滨湖银泰百货</text>
  <text x="762" y="414" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="15" fill="#16a34a">商场级，优先选择</text>

  <rect x="468" y="446" width="448" height="42" rx="10" fill="#f8fafc"/>
  <text x="488" y="473" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="16" fill="#64748b">植村秀(滨湖银泰城店)</text>
  <text x="760" y="473" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="14" fill="#dc2626">店铺级，降权</text>

  <g transform="translate(132 330)">
    <circle cx="18" cy="18" r="18" fill="#ef255c"/>
    <text x="12" y="25" font-family="Arial" font-size="20" font-weight="700" fill="#fff">1</text>
    <text x="50" y="24" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" fill="#334155">先确认标签是“位置”</text>
    <circle cx="18" cy="74" r="18" fill="#ef255c"/>
    <text x="12" y="81" font-family="Arial" font-size="20" font-weight="700" fill="#fff">2</text>
    <text x="50" y="80" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" fill="#334155">再选择“带货模式”</text>
    <circle cx="18" cy="130" r="18" fill="#ef255c"/>
    <text x="12" y="137" font-family="Arial" font-size="20" font-weight="700" fill="#fff">3</text>
    <text x="50" y="136" font-family="Arial,'PingFang SC','Microsoft YaHei',sans-serif" font-size="17" fill="#334155">切到“国内”并输入位置</text>
  </g>
</svg>
